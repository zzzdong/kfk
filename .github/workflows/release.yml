name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v7

      - name: Build release
        uses: houseabsolute/actions-rust-cross@v1
        with:
          target: ${{ matrix.target }}
          args: --release

      - name: Prepare archive
        shell: bash
        run: |
          ARTIFACTS_DIR="${{ runner.temp }}/artifacts"
          mkdir -p "$ARTIFACTS_DIR"
          cd target/${{ matrix.target }}/release
          case "${{ matrix.ext }}" in
            tar.gz)
              tar czf "$ARTIFACTS_DIR/kfk-${{ matrix.target }}.tar.gz" kfk
              ;;
            zip)
              7z a -tzip "$ARTIFACTS_DIR/kfk-${{ matrix.target }}.zip" kfk.exe
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kfk-${{ matrix.target }}
          path: ${{ runner.temp }}/artifacts/kfk-${{ matrix.target }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/artifacts

      - name: Generate checksums
        run: |
          cd "${{ runner.temp }}/artifacts"
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} + > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          fail_on_unmatched_files: false
          files: |
            ${{ runner.temp }}/artifacts/**/*
